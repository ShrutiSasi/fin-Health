name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint-r:
    name: Lint R code
    runs-on: ubuntu-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::lintr

      - name: Run lintr
        run: |
          Rscript -e '
            lints <- lintr::lint_dir("src")
            print(lints)
            if (length(lints) > 0) quit(status = 1)
          '

  validate-app:
    name: Validate Shiny app loads
    runs-on: ubuntu-latest
    needs: lint-r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e '
            install.packages(c(
              "shiny", "bslib", "here", "readr", "dplyr", "stringr",
              "ggplot2", "plotly", "tidyr", "DT"
            ), repos = "https://cloud.r-project.org")
          '

      - name: Validate app parses without error
        run: |
          Rscript -e '
            setwd(".")
            tryCatch({
              source("src/data.R")
              source("src/charts/ggplot_charts.R")
              source("src/components/kpi_card.R")
              source("src/pages/sector.R")
              source("src/app.R")
              message("App parsed successfully.")
            }, error = function(e) {
              message("App failed to parse: ", conditionMessage(e))
              quit(status = 1)
            })
          '
